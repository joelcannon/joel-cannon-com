<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel Cannon</title>
<meta name="description" content="Joel Cannon — Cannon Ops, Gallatin, Missouri.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #111114;
    --ink: #ededee;
    --ink-dim: #8a8a92;
    --ink-faint: #44444a;
    --accent: #d4a373;
    --rule: #1f1f24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* subtle grain overlay for depth */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.025;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  }

  /* faint radial glow off-center */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(
      ellipse 60% 40% at 30% 20%,
      rgba(212, 163, 115, 0.08),
      transparent 70%
    );
  }

  main {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
    padding: clamp(2rem, 6vw, 5rem);
    max-width: 1200px;
    margin: 0 auto;
  }

  .content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(2rem, 4vw, 3rem);
    animation: fadeUp 1.1s cubic-bezier(.2, .7, .2, 1) both;
  }

  .photo {
    width: clamp(120px, 16vw, 180px);
    height: clamp(120px, 16vw, 180px);
    border-radius: 50%;
    background: var(--bg-elev);
    border: 1px solid var(--rule);
    object-fit: cover;
    filter: grayscale(20%) contrast(1.05);
    transition: filter 0.6s ease;
  }

  .photo:hover {
    filter: grayscale(0%) contrast(1.05);
  }

  .name-block {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(3rem, 9vw, 6rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    font-variation-settings: "opsz" 144;
  }

  h1 .last {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  .tag::before {
    content: "— ";
    color: var(--ink-faint);
  }

  .links {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: 0.02em;
    padding: 0.6rem 0;
    position: relative;
    transition: color 0.3s ease;
  }

  .links a::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--ink-faint);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(.2, .7, .2, 1), background 0.3s ease;
  }

  .links a:hover {
    color: var(--accent);
  }

  .links a:hover::after {
    background: var(--accent);
    transform: scaleX(1.05);
  }

  .links a .arrow {
    display: inline-block;
    margin-left: 0.4rem;
    transition: transform 0.3s ease;
  }

  .links a:hover .arrow {
    transform: translate(2px, -2px);
  }

  footer {
    align-self: end;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-top: 4rem;
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 1rem;
  }

  footer .location::before {
    content: "◆ ";
    color: var(--accent);
    opacity: 0.6;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* stagger child reveals */
  .content > * { animation: fadeUp 1.1s cubic-bezier(.2, .7, .2, 1) both; }
  .content > *:nth-child(1) { animation-delay: 0.1s; }
  .content > *:nth-child(2) { animation-delay: 0.25s; }
  .content > *:nth-child(3) { animation-delay: 0.4s; }

  footer { animation: fadeUp 1.4s cubic-bezier(.2, .7, .2, 1) 0.6s both; }

  @media (max-width: 600px) {
    footer {
      flex-direction: column;
      align-items: flex-start;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<main>
  <div class="content">
    <img src="joel.jpg" alt="Joel Cannon" class="photo" onerror="this.style.display='none'">

    <div class="name-block">
      <h1>Joel <span class="last">Cannon</span></h1>
      <div class="tag">Cannon Ops</div>
    </div>

    <nav class="links">
      <a href="https://github.com/joelcannon" target="_blank" rel="noopener">
        GitHub<span class="arrow">↗</span>
      </a>
      <a href="https://www.linkedin.com/in/joelwcannon/" target="_blank" rel="noopener">
        LinkedIn<span class="arrow">↗</span>
      </a>
    </nav>
  </div>

  <footer>
    <div class="location">Gallatin, Missouri</div>
    <div>© 2026</div>
  </footer>
</main>
</body>
</html>
